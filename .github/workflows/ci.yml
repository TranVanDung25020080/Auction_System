name: Java CI Automation

on:
  push:
    branches: [ master, tranvandung ]
  pull_request:
    branches: [ master, tranvandung ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    # MySQL Service chỉ chạy được trên Linux (ubuntu-latest)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: '123Dung#'
          MYSQL_DATABASE: auction_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'
          cache: 'maven'

      - name: Build and Verify with JaCoCo
        # Sử dụng biến môi trường để kết nối Database
        run: mvn clean verify
        env:
          DATABASE_SECRET_KEY: ${{ secrets.APP_DB_CONN }}
          DB_URL: jdbc:mysql://localhost:3306/auction_db
          DB_USER: root
          DB_PASSWORD: '123Dung#'

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.os }}
          # Đường dẫn cho dự án đa module (server, client, common)
          path: "**/target/site/jacoco/"

      - name: Automate Continuous Delivery (GitHub Release)
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Production Release Build v1.0.${{ github.run_number }}
          body: |
            🎉 Hệ thống CD tự động phát hành phiên bản mới!
            - Trạng thái: Build & Kiểm thử thành công trên 3 Hệ điều hành.
            - Độ bao phủ mã nguồn (JaCoCo): Đạt chuẩn > 80%.
            - Mã định danh tự động: #${{ github.run_number }}
          # Lấy tất cả file jar từ các module con
          files: |
            server/target/*.jar
            client/target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
